name: CI

on:
  push:
    branches: [v3, main]
  pull_request:
    branches: [v3, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run test:unit

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
        env:
          NEXTAUTH_SECRET: ci-placeholder-secret-32-chars-long
          NEXTAUTH_URL: http://localhost:3000
          JWT_SECRET: ci-placeholder-jwt-secret-32-chars
          DATABASE_URL: postgres://fake:fake@localhost:5432/fake
          NEXT_PUBLIC_SUPABASE_URL: https://fake.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: fake
          DEPLOY_MODE: v3

  migrations:
    # Prod-parity migration smoke. Spins pgvector/pgvector:pg16 (mirrors
    # Supabase Cloud's pgvector availability - 0023_scrape_snapshots.sql
    # creates the vector extension), runs scripts/migrate.ts against a
    # fresh DB, runs it again to assert idempotency, then greps both
    # logs for fatal Postgres patterns that an exit-0 migrate run can
    # still leave behind (the 0075 IMMUTABLE-disaster shape). Finally
    # invokes tests/migrations/*.spec.ts for structural assertions
    # (0075 no-op contract, schema_migrations row integrity).
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      DEPLOY_MODE: self_hosted
    defaults:
      run:
        # pipefail so `npm run self-hosted:migrate | tee` propagates the
        # migrate.ts process.exit(1) failure mode instead of letting tee
        # mask it as exit 0 (the bug that the first CI green-then-fail
        # cycle on this PR exposed).
        shell: bash -eo pipefail {0}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: First apply (fresh DB)
        run: npm run self-hosted:migrate 2>&1 | tee migrate1.log
      - name: Second apply (idempotency)
        run: npm run self-hosted:migrate 2>&1 | tee migrate2.log
      - name: Grep fatal patterns in migrate logs
        # An exit-0 migrate can still print recoverable-looking ERROR
        # lines that mask a real problem; this catches the IMMUTABLE-class
        # failures the 0075 disaster showed CI was blind to.
        run: |
          if grep -nE 'ERROR|FATAL|not immutable|must be marked IMMUTABLE|syntax error|generation expression' migrate1.log migrate2.log; then
            echo "Fatal migration pattern detected in logs"
            exit 1
          fi
      - name: Migration assertion specs
        run: npx tsx --test tests/migrations/*.spec.ts
