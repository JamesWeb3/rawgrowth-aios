name: Build + publish Docker image

# Build the rawclaw v3 image on GitHub Actions runners (free 7GB RAM)
# and push to GHCR. Production VPS only `docker pull`s — no rebuild on
# the box. Was: VPS ran `docker compose up --build` which OOM-killed
# the 4GB CX22 every deploy and hung the host.

on:
  push:
    branches: [v3]
    paths:
      - "src/**"
      - "scripts/**"
      - "supabase/**"
      - "patches/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - "docker/**"
      - ".github/workflows/build-image.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # Image name follows the repo path. Lowercase per GHCR requirement.
  IMAGE_NAME: rawgrowth-consulting/rawclaw

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Lets GITHUB_TOKEN push to ghcr.io/<owner>/<repo> without an
      # extra PAT. Default scope is read; we need write here.
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=v3
            type=sha,format=short,prefix=v3-

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # standalone Next output is ~150MB, full image ~600MB.
          # Compress to save GHCR bandwidth on every VPS pull.
          provenance: false
